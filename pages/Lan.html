<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN Party Hiver 2026 - Le Trio Légendaire</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --pizza-orange: #ff9100;
            --dark-space: #0b0e14;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-space);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .event-container {
            max-width: 900px;
            display: flex;
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #30363d;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.15);
            margin: 20px;
        }

        .image-side {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
        }

        .image-side img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content-side {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge-live {
            background: #ff3e3e;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            width: fit-content;
            margin-bottom: 15px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: var(--neon-blue);
        }

        .tagline {
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 25px;
        }

        .trio-icons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon-box {
            text-align: center;
            font-size: 0.9rem;
            color: var(--pizza-orange);
        }

        .icon-box span {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid var(--neon-blue);
        }

        .cta-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-register {
            background: var(--neon-blue);
            color: #000;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-register:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .stock-warning {
            color: #ff3e3e;
            font-size: 0.9rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .event-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="event-container">
    <div class="image-side">
        <img src="https://raw.githubusercontent.com/maparent1/ImagesProjetTest/main/assets/LAN.png" alt="LAN Party Hiver 2026">
    </div>

    <div class="content-side">
        <div class="badge-live">ÉVÉNEMENT HIVER 2026</div>
        <h1>LAN Party</h1>
        <p class="tagline">Jeux, code et pizza : le trio légendaire.</p>

        <div class="trio-icons">
            <div class="icon-box"><span>🎮</span> JEUX</div>
            <div class="icon-box"><span>💻</span> CODE</div>
            <div class="icon-box"><span>🍕</span> PIZZA</div>
        </div>

        <div class="info-panel">
            <strong>Où :</strong>Cégep<br>
            <strong>Quand :</strong> Décembre 2026<br>
            <strong>Équipement :</strong> Apportez votre setup (et votre café).
        </div>

        <div class="cta-group">
            <a href="#" class="btn-register" onclick="alert('Inscription confirmée ! Préparez vos serveurs.')">Réserver ma place</a>
            <span class="stock-warning">⚠️ Places limitées !</span>
        </div>
    </div>
</div>

</body>
</html>
